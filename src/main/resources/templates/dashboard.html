<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Keuangan</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins', sans-serif;
            background:#f8fafc;
            color:#1e293b;
            overflow-x:hidden;
            position:relative;
        }

        /* BACKGROUND ANIMATION */
        body::before{
            content:'';
            position:fixed;
            width:450px;
            height:450px;
            background:rgba(59,130,246,0.08);
            border-radius:50%;
            top:-120px;
            right:-100px;
            z-index:-1;
            animation:float1 8s ease-in-out infinite;
        }

        body::after{
            content:'';
            position:fixed;
            width:350px;
            height:350px;
            background:rgba(147,51,234,0.08);
            border-radius:50%;
            bottom:-120px;
            left:-80px;
            z-index:-1;
            animation:float2 10s ease-in-out infinite;
        }

        @keyframes float1{
            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(20px);
            }

            100%{
                transform:translateY(0px);
            }
        }

        @keyframes float2{
            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-20px);
            }

            100%{
                transform:translateY(0px);
            }
        }

        /* SIDEBAR */
        .sidebar{
            width:260px;
            height:100vh;
            position:fixed;
            left:0;
            top:0;

            background:
            linear-gradient(
            180deg,
            #0f172a,
            #1e1b4b,
            #312e81,
            #2563eb
            );

            background-size:400% 400%;
            animation:gradientMove 12s ease infinite;

            padding:30px 20px;
            color:white;
            overflow-y:auto;
            z-index:1000;
            box-shadow:6px 0 25px rgba(37,99,235,0.25);
        }

        @keyframes gradientMove{
            0%{
                background-position:0% 50%;
            }

            50%{
                background-position:100% 50%;
            }

            100%{
                background-position:0% 50%;
            }
        }

        /* LOGO */
        .sidebar h2{
            text-align:center;
            margin-bottom:50px;
            font-size:30px;
            font-weight:700;
            letter-spacing:1px;
            position:relative;
        }

        .sidebar h2::after{
            content:'';
            width:80px;
            height:4px;
            border-radius:10px;
            background:linear-gradient(90deg,#60a5fa,#c084fc);
            position:absolute;
            left:50%;
            transform:translateX(-50%);
            bottom:-12px;
        }

        /* MENU */
        .menu{
            display:flex;
            flex-direction:column;
            gap:16px;
        }

        .sidebar a{
            text-decoration:none;
            color:white;
            display:flex;
            align-items:center;
            gap:14px;
            padding:17px 18px;
            border-radius:18px;
            transition:0.35s ease;
            font-size:15px;
            font-weight:500;
            position:relative;
            overflow:hidden;
        }

        .sidebar a::before{
            content:'';
            position:absolute;
            width:0%;
            height:100%;
            left:0;
            top:0;
            background:rgba(255,255,255,0.1);
            transition:0.4s;
        }

        .sidebar a:hover::before{
            width:100%;
        }

        .sidebar a:hover{
            transform:translateX(8px) scale(1.02);
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        .sidebar a.active{
            background:rgba(255,255,255,0.18);
            backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.15);
            font-weight:600;
            box-shadow:0 10px 25px rgba(255,255,255,0.08);
        }

        /* ICON ANIMATION */
        .sidebar a:hover span{
            animation:wiggle 0.5s ease;
        }

        @keyframes wiggle{
            0%{
                transform:rotate(0deg);
            }

            25%{
                transform:rotate(-10deg);
            }

            50%{
                transform:rotate(10deg);
            }

            75%{
                transform:rotate(-5deg);
            }

            100%{
                transform:rotate(0deg);
            }
        }

        /* MAIN */
        .main{
            margin-left:260px;
            padding:35px;
            min-height:100vh;
        }

        /* TOPBAR */
        .topbar{
            background:rgba(255,255,255,0.92);
            backdrop-filter:blur(10px);
            padding:28px 35px;
            border-radius:28px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:20px;
            box-shadow:0 8px 25px rgba(0,0,0,0.06);
        }

        .topbar h1{
            font-size:36px;
            margin-bottom:8px;
            color:#1e293b;
        }

        .topbar p{
            color:#64748b;
            font-size:15px;
        }

        /* PROFILE */
        .profile{
            background:linear-gradient(135deg,#dbeafe,#ede9fe);
            padding:12px 18px;
            border-radius:16px;
            color:#4338ca;
            font-weight:600;
            animation:pulse 3s infinite;
        }

        @keyframes pulse{
            0%{
                transform:scale(1);
            }

            50%{
                transform:scale(1.05);
            }

            100%{
                transform:scale(1);
            }
        }

        /* CARDS */
        .cards{
            margin-top:35px;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:25px;
        }

        .card{
            position:relative;
            overflow:hidden;
            padding:30px;
            border-radius:28px;
            color:white;
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            box-shadow:0 10px 25px rgba(37,99,235,0.25);
            transition:0.4s;
        }

        .card:hover{
            transform:translateY(-8px) scale(1.02);
        }

        .card::before{
            content:'';
            position:absolute;
            width:140px;
            height:140px;
            background:rgba(255,255,255,0.12);
            border-radius:50%;
            top:-40px;
            right:-30px;
        }

        .card h3{
            font-size:17px;
            color:#dbeafe;
            margin-bottom:15px;
            position:relative;
            z-index:2;
        }

        .card p{
            font-size:32px;
            font-weight:700;
            position:relative;
            z-index:2;
        }

        /* SECTION TITLE */
        .section-title{
            margin-top:45px;
            margin-bottom:20px;
        }

        .section-title h2{
            font-size:28px;
            color:#1e293b;
        }

        /* TABLE */
        .table-container{
            background:white;
            border-radius:25px;
            overflow-x:auto;
            box-shadow:0 8px 20px rgba(0,0,0,0.06);
        }

        table{
            width:100%;
            border-collapse:collapse;
            min-width:700px;
        }

        table th{
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            color:white;
            text-align:left;
            padding:18px;
            font-size:15px;
        }

        table td{
            padding:18px;
            border-bottom:1px solid #e5e7eb;
            font-size:14px;
        }

        table tr{
            transition:0.3s;
        }

        table tr:hover{
            background:#f8fafc;
            transform:scale(1.01);
        }

        /* BADGE */
        .badge{
            padding:8px 14px;
            border-radius:20px;
            font-size:13px;
            font-weight:600;
            display:inline-block;
        }

        .pemasukan{
            background:#dcfce7;
            color:#166534;
        }

        .pengeluaran{
            background:#fee2e2;
            color:#991b1b;
        }

        /* RESPONSIVE */
        @media(max-width:900px){

            .sidebar{
                width:220px;
            }

            .main{
                margin-left:220px;
                padding:25px;
            }

        }

        @media(max-width:768px){

            .sidebar{
                width:100%;
                height:auto;
                position:relative;
                border-radius:0 0 25px 25px;
            }

            .menu{
                flex-direction:row;
                flex-wrap:wrap;
                justify-content:center;
            }

            .sidebar a{
                justify-content:center;
            }

            .main{
                margin-left:0;
                padding:20px;
            }

            .topbar{
                padding:25px;
            }

            .topbar h1{
                font-size:28px;
            }

        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h2>🪙 CashMate</h2>

    <div class="menu">

        <a href="/dashboard" class="active">
            <span>📊</span> Dashboard
        </a>

        <a href="/transaksi">
            <span>💸</span> Transaksi
        </a>

        <a href="/anggaran">
            <span>📈</span> Anggaran
        </a>

        <a href="/tabungan">
            <span>🎯</span> Tabungan
        </a>

    </div>

</div>

<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">

        <div>
            <h1>Dashboard Keuangan ✨</h1>
            <p>Pantau pemasukan dan pengeluaranmu secara real-time</p>
        </div>

        <div class="profile">
            👋 Selamat Datang
        </div>

    </div>

    <!-- CARDS -->
    <div class="cards">

        <div class="card">

            <h3>🪙 Total Saldo</h3>

            <p th:text="'Rp ' + ${#numbers.formatInteger(saldo, 3, 'POINT')}"></p>

        </div>

        <div class="card">

            <h3>📈 Pemasukan</h3>

            <p th:text="'Rp ' + ${#numbers.formatInteger(pemasukan, 3, 'POINT')}"></p>

        </div>

        <div class="card">

            <h3>💸 Pengeluaran</h3>

            <p th:text="'Rp ' + ${#numbers.formatInteger(pengeluaran, 3, 'POINT')}"></p>

        </div>

    </div>

    <!-- TABLE -->
    <div class="section-title">
        <h2>Histori Transaksi</h2>
    </div>

    <div class="table-container">

        <table>

            <tr>
                <th>ID</th>
                <th>Nama</th>
                <th>Jenis</th>
                <th>Jumlah</th>
            </tr>

            <tr th:each="t : ${listTransaksi}">

                <td th:text="${t.id}"></td>

                <td th:text="${t.nama}"></td>

                <td>

                    <span th:if="${t.jenis == 'Pemasukan'}"
                          class="badge pemasukan">
                        Pemasukan
                    </span>

                    <span th:if="${t.jenis == 'Pengeluaran'}"
                          class="badge pengeluaran">
                        Pengeluaran
                    </span>

                </td>

                <td th:text="'Rp ' + ${#numbers.formatInteger(t.jumlah, 3, 'POINT')}"></td>

            </tr>

        </table>

    </div>

</div>

</body>
</html>
