<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Keuangan</title>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#eef2ff;       
         }
        .sidebar{
            width:200px;
            height:100vh;
            background:linear-gradient(180deg,#1e3a8a,#2563eb);
            position:fixed;
            left:0;
            top:0;
            color:white;
            padding:25px;
            box-shadow:4px 0 15px rgba(0,0,0,0.1);
        }

        .sidebar h2{
            text-align:center;
            margin-bottom:40px;
        }

        .sidebar a{
    display:flex;
    align-items:center;
    gap:10px;
    color:white;
    text-decoration:none;
    padding:15px;
    margin-bottom:12px;
    border-radius:14px;
    transition:0.3s;
    font-weight:500;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.15);
    transform:translateX(5px);
}

        .sidebar a:hover{
            background:rgba(255,255,255,0.2);
        }

        .main{
    margin-left:100px;
    padding:30px;
}

        .cards{
        display:flex;
        gap:20px;
        flex-wrap:nowrap;
        margin-top:30px;
        }
        .card{
    flex:1;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    padding:28px;
    border-radius:28px;
    box-shadow:0 10px 25px rgba(37,99,235,0.25);
    color:white;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-6px) scale(1.02);
}

.card::before{
    content:'';
    position:absolute;
    width:120px;
    height:120px;
    background:rgba(255,255,255,0.1);
    border-radius:50%;
    top:-30px;
    right:-30px;
}

        .card h3{
            margin:0;
            color:#dbeafe;
            font-size:18px;
        }

        .card p{
            font-size:32px;
            font-weight:bold;
            margin-top:15px;
            color:white;
        }
        table{
    width:100%;
    margin-top:25px;
    border-collapse:collapse;
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

table th{
    background:#2563eb;
    color:white;
    padding:18px;
    text-align:left;
}

table td{
    padding:18px;
    border-bottom:1px solid #e5e7eb;
}

table tr:hover{
    background:#f8fafc;
}

        .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.topbar h1{
    margin:0;
    font-size:34px;
    color:#1e293b;
}

.topbar p{
    margin-top:8px;
    color:#64748b;
}
.badge{
    padding:8px 14px;
    border-radius:20px;
    font-size:14px;
    font-weight:bold;
}

.pemasukan{
    background:#dcfce7;
    color:#166534;
}

.pengeluaran{
    background:#fee2e2;
    color:#991b1b;
}
    </style>
</head>

<body>

<div class="sidebar">

    <h2>FinanceTracker</h2>

    <a href="/dashboard">Dashboard</a>

    <a href="/transaksi">Transaksi</a>

    <a href="/anggaran">Anggaran</a>

    <a href="/tabungan">Tabungan</a>

</div>

<div class="main">

<div class="topbar">

    <div>
        <h1>Dashboard Keuangan</h1>
        <p>Pantau pemasukan dan pengeluaranmu</p>
    </div>

</div>
    <div class="cards"> 
    <div class="card">
        <h3>Total Saldo</h3>
        <p th:text="'Rp ' + ${#numbers.formatInteger(saldo, 3, 'POINT')}"></p>
    </div>

    <div class="card">
        <h3>Pemasukan</h3>
        <p th:text="'Rp ' + ${#numbers.formatInteger(pemasukan, 3, 'POINT')}"></p>
    </div>

    <div class="card">
        <h3>Pengeluaran</h3>
        <p th:text="'Rp ' + ${#numbers.formatInteger(pengeluaran, 3, 'POINT')}"></p>
    </div>
</div>
    <h2 style="margin-top:40px;">
    Histori Transaksi
</h2>

<table>

    <tr>
        <th>ID</th>
        <th>Nama</th>
        <th>Jenis</th>
        <th>Jumlah</th>
    </tr>

    <tr th:each="t : ${listTransaksi}">

        <td th:text="${t.id}"></td>

        <td th:text="${t.nama}"></td>

        <td>

    <span th:if="${t.jenis == 'Pemasukan'}"
          class="badge pemasukan">
        Pemasukan
    </span>

    <span th:if="${t.jenis == 'Pengeluaran'}"
          class="badge pengeluaran">
        Pengeluaran
    </span>

</td>
        <td th:text="'Rp ' + ${#numbers.formatInteger(t.jumlah, 3, 'POINT')}"></td>

    </tr>

</table>
</div>

</body>
</html>
