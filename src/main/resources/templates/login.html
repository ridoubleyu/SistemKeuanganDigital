<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - FinanceTracker</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:40px;
            width:350px;
            border-radius:20px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            color:#2563eb;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:10px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1e40af;
        }

        .back{
            text-align:center;
            margin-top:20px;
        }

        .back a{
            text-decoration:none;
            color:#2563eb;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>Login</h2>

    <form action="/login" method="post">

        <input type="email" name="email" placeholder="Masukkan Email" required>

        <input type="password" name="password" placeholder="Masukkan Password" required>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="back">
        <a href="/">← Kembali ke Home</a>
    </div>

</div>

</body>
</html>
