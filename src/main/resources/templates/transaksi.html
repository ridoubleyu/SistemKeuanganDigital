<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaksi - FinanceTracker</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins', sans-serif;
            background:#f8fafc;
            color:#1e293b;
            overflow-x:hidden;
            position:relative;
        }

        /* BACKGROUND */
        body::before{
            content:'';
            position:fixed;
            width:450px;
            height:450px;
            background:rgba(59,130,246,0.08);
            border-radius:50%;
            top:-120px;
            right:-100px;
            z-index:-1;
            animation:float1 8s ease-in-out infinite;
        }

        body::after{
            content:'';
            position:fixed;
            width:350px;
            height:350px;
            background:rgba(168,85,247,0.08);
            border-radius:50%;
            bottom:-120px;
            left:-80px;
            z-index:-1;
            animation:float2 10s ease-in-out infinite;
        }

        @keyframes float1{
            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(20px);
            }

            100%{
                transform:translateY(0px);
            }
        }

        @keyframes float2{
            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-20px);
            }

            100%{
                transform:translateY(0px);
            }
        }

        /* SIDEBAR */
        .sidebar{
            width:260px;
            height:100vh;
            position:fixed;
            left:0;
            top:0;

            background:
            linear-gradient(
            180deg,
            #0f172a,
            #1e1b4b,
            #312e81,
            #2563eb
            );

            background-size:400% 400%;
            animation:gradientMove 12s ease infinite;

            padding:30px 20px;
            overflow-y:auto;
            z-index:1000;
            box-shadow:6px 0 25px rgba(37,99,235,0.25);
        }

        @keyframes gradientMove{
            0%{
                background-position:0% 50%;
            }

            50%{
                background-position:100% 50%;
            }

            100%{
                background-position:0% 50%;
            }
        }

        /* LOGO */
        .logo{
            text-align:center;
            color:white;
            font-size:30px;
            font-weight:700;
            margin-bottom:50px;
            position:relative;
        }

        .logo::after{
            content:'';
            width:80px;
            height:4px;
            border-radius:10px;
            background:linear-gradient(90deg,#60a5fa,#c084fc);
            position:absolute;
            left:50%;
            transform:translateX(-50%);
            bottom:-12px;
        }

        /* MENU */
        .menu{
            display:flex;
            flex-direction:column;
            gap:16px;
        }

        .sidebar a{
            text-decoration:none;
            color:white;
            display:flex;
            align-items:center;
            gap:14px;
            padding:17px 18px;
            border-radius:18px;
            transition:0.35s ease;
            font-size:15px;
            font-weight:500;
            position:relative;
            overflow:hidden;
        }

        .sidebar a::before{
            content:'';
            position:absolute;
            width:0%;
            height:100%;
            left:0;
            top:0;
            background:rgba(255,255,255,0.1);
            transition:0.4s;
        }

        .sidebar a:hover::before{
            width:100%;
        }

        .sidebar a:hover{
            transform:translateX(8px) scale(1.02);
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        .sidebar a.active{
            background:rgba(255,255,255,0.18);
            backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.15);
            font-weight:600;
            box-shadow:0 10px 25px rgba(255,255,255,0.08);
        }

        /* ICON GOYANG */
        .sidebar a:hover span{
            animation:wiggle 0.5s ease;
        }

        @keyframes wiggle{
            0%{
                transform:rotate(0deg);
            }

            25%{
                transform:rotate(-10deg);
            }

            50%{
                transform:rotate(10deg);
            }

            75%{
                transform:rotate(-5deg);
            }

            100%{
                transform:rotate(0deg);
            }
        }

        /* MAIN */
        .main{
            margin-left:260px;
            padding:35px;
            min-height:100vh;
        }

        /* TOPBAR */
        .topbar{
            background:rgba(255,255,255,0.92);
            backdrop-filter:blur(10px);
            padding:30px;
            border-radius:28px;
            box-shadow:0 8px 25px rgba(0,0,0,0.06);
            margin-bottom:30px;
        }

        .topbar h1{
            font-size:36px;
            margin-bottom:10px;
            color:#1e293b;
        }

        .topbar p{
            color:#64748b;
            font-size:15px;
        }

        /* FORM BOX */
        .box{
            background:white;
            padding:35px;
            border-radius:28px;
            box-shadow:0 8px 25px rgba(0,0,0,0.06);
            margin-bottom:35px;
            position:relative;
            overflow:hidden;
        }

        .box::before{
            content:'';
            position:absolute;
            width:180px;
            height:180px;
            background:rgba(37,99,235,0.05);
            border-radius:50%;
            top:-60px;
            right:-60px;
        }

        .form-title{
            font-size:25px;
            margin-bottom:25px;
            color:#2563eb;
            font-weight:700;
            position:relative;
            z-index:2;
        }

        .form-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            position:relative;
            z-index:2;
        }

        .input-group{
            display:flex;
            flex-direction:column;
        }

        .input-group label{
            margin-bottom:8px;
            font-size:14px;
            font-weight:500;
            color:#374151;
        }

        input,
        select{
            width:100%;
            padding:14px 16px;
            border-radius:16px;
            border:1px solid #d1d5db;
            outline:none;
            font-size:14px;
            transition:0.3s;
            background:#f9fafb;
        }

        input:focus,
        select:focus{
            border-color:#2563eb;
            background:white;
            box-shadow:0 0 0 4px rgba(37,99,235,0.1);
        }

        /* BUTTON */
        .btn{
            margin-top:25px;
            padding:15px 24px;
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            color:white;
            border:none;
            border-radius:16px;
            cursor:pointer;
            font-size:15px;
            font-weight:600;
            transition:0.3s;
            box-shadow:0 10px 20px rgba(37,99,235,0.25);
        }

        .btn:hover{
            transform:translateY(-3px) scale(1.02);
            box-shadow:0 15px 25px rgba(37,99,235,0.35);
        }

        /* TABLE */
        .table-box{
            background:white;
            border-radius:28px;
            overflow:hidden;
            overflow-x:auto;
            box-shadow:0 8px 25px rgba(0,0,0,0.06);
        }

        table{
            width:100%;
            border-collapse:collapse;
            min-width:850px;
        }

        th{
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            color:white;
            padding:18px;
            text-align:left;
            font-size:14px;
        }

        td{
            padding:18px;
            border-bottom:1px solid #e5e7eb;
            font-size:14px;
        }

        tr{
            transition:0.3s;
        }

        tr:hover{
            background:#f8fafc;
            transform:scale(1.005);
        }

        /* BADGE */
        .badge{
            padding:8px 14px;
            border-radius:20px;
            font-size:13px;
            font-weight:600;
            display:inline-block;
        }

        .pemasukan{
            background:#dcfce7;
            color:#166534;
        }

        .pengeluaran{
            background:#fee2e2;
            color:#991b1b;
        }

        /* ACTION */
        .aksi{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .edit-btn{
            background:#facc15;
            color:#78350f;
            text-decoration:none;
            padding:9px 14px;
            border-radius:12px;
            font-size:13px;
            font-weight:600;
            transition:0.3s;
        }

        .edit-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 15px rgba(250,204,21,0.3);
        }

        .hapus{
            background:#ef4444;
            color:white;
            text-decoration:none;
            padding:9px 14px;
            border-radius:12px;
            font-size:13px;
            font-weight:600;
            transition:0.3s;
        }

        .hapus:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 15px rgba(239,68,68,0.3);
        }

        /* RESPONSIVE */
        @media(max-width:768px){

            .sidebar{
                width:100%;
                height:auto;
                position:relative;
                border-radius:0 0 25px 25px;
            }

            .menu{
                flex-direction:row;
                flex-wrap:wrap;
                justify-content:center;
            }

            .main{
                margin-left:0;
                padding:20px;
            }

            .topbar h1{
                font-size:28px;
            }

        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        🪙 CashMate
    </div>

    <div class="menu">

        <a href="/dashboard">
            <span>📊</span> Dashboard
        </a>

        <a href="/transaksi" class="active">
            <span>💸</span> Transaksi
        </a>

        <a href="/anggaran">
            <span>📈</span> Anggaran
        </a>

        <a href="/tabungan">
            <span>🎯</span> Tabungan
        </a>

    </div>

</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="topbar">

        <h1>Manajemen Transaksi ✨</h1>

        <p>
            Tambahkan dan kelola pemasukan maupun pengeluaranmu dengan mudah
        </p>

    </div>

    <!-- FORM -->
    <div class="box">

        <div class="form-title">
            ➕ Tambah Transaksi
        </div>

        <form action="/transaksi" method="post">

            <div class="form-grid">

                <div class="input-group">

                    <label>Nama Transaksi</label>

                    <input type="text"
                           name="nama"
                           placeholder="Contoh: Gaji Bulanan"
                           required>

                </div>

                <div class="input-group">

                    <label>Jumlah</label>

                    <input type="number"
                           name="jumlah"
                           placeholder="Masukkan Jumlah"
                           required>

                </div>

                <div class="input-group">

                    <label>Kategori</label>

                    <select name="kategori" required>

                        <option value="">
                            -- Pilih Kategori --
                        </option>

                        <option value="Makan">
                            🍔 Makan
                        </option>

                        <option value="Transport">
                            🚗 Transport
                        </option>

                        <option value="Belanja">
                            🛍️ Belanja
                        </option>

                        <option value="Hiburan">
                            🎮 Hiburan
                        </option>

                        <option value="Gaji">
                            💼 Gaji
                        </option>

                    </select>

                </div>

                <div class="input-group">

                    <label>Jenis</label>

                    <select name="jenis" required>

                        <option value="">
                            -- Pilih Jenis --
                        </option>

                        <option value="Pemasukan">
                            📈 Pemasukan
                        </option>

                        <option value="Pengeluaran">
                            💸 Pengeluaran
                        </option>

                    </select>

                </div>

            </div>

            <button type="submit" class="btn">
                🚀 Tambah Transaksi
            </button>

        </form>

    </div>

    <!-- TABLE -->
    <div class="table-box">

        <table>

            <tr>
                <th>ID</th>
                <th>Nama</th>
                <th>Jumlah</th>
                <th>Jenis</th>
                <th>Kategori</th>
                <th>Aksi</th>
            </tr>

            <tr th:each="t : ${listTransaksi}">

                <td th:text="${t.id}"></td>

                <td th:text="${t.nama}"></td>

                <td th:text="'Rp ' + ${#numbers.formatInteger(t.jumlah, 3, 'POINT')}"></td>

                <td>

                    <span th:if="${t.jenis == 'Pemasukan'}"
                          class="badge pemasukan">
                        Pemasukan
                    </span>

                    <span th:if="${t.jenis == 'Pengeluaran'}"
                          class="badge pengeluaran">
                        Pengeluaran
                    </span>

                </td>

                <td th:text="${t.kategori}"></td>

                <td>

                    <div class="aksi">

                        <a class="edit-btn"
                           th:href="@{/transaksi/edit/{id}(id=${t.id})}">
                            ✏️ Edit
                        </a>

                        <a class="hapus"
                           th:href="@{/transaksi/delete/{id}(id=${t.id})}">
                            🗑️ Hapus
                        </a>

                    </div>

                </td>

            </tr>

        </table>

    </div>

</div>

</body>
</html>
