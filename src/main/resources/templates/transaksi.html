<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Transaksi</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:30px;
        }

        h1{
            color:#2563eb;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:20px;
            margin-bottom:30px;
        }

        input, select{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
            border-radius:10px;
            border:1px solid #ccc;
        }

        button{
            padding:12px 20px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            border-radius:20px;
            overflow:hidden;
        }

        th{
            background:#2563eb;
            color:white;
            padding:15px;
        }

        td{
            padding:15px;
            border-bottom:1px solid #ddd;
        }

        .hapus{
            background:red;
            color:white;
            padding:8px 12px;
            border-radius:8px;
            text-decoration:none;
        }
        .dashboard-btn{
            display:inline-block;
            margin-bottom:20px;
            padding:12px 20px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:10px;
        }
        
        .sidebar{
    position:fixed;
    left:20px;
    top:20px;
    width:70px;
    height:90vh;
    background:rgba(37,99,235,0.25);
    backdrop-filter:blur(10px);
    border-radius:25px;
    padding-top:20px;
    overflow:hidden;
    transition:0.4s;
    z-index:1000;
}

.sidebar:hover{
    width:240px;
    background:rgba(37,99,235,0.85);
}

.logo{
    color:white;
    font-size:28px;
    text-align:center;
    margin-bottom:40px;
    font-weight:bold;
}

.sidebar a{
    display:flex;
    align-items:center;
    color:white;
    text-decoration:none;
    padding:18px 25px;
    margin:10px;
    border-radius:15px;
    white-space:nowrap;
    transition:0.3s;
    font-weight:500;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.2);
    transform:translateX(5px);
}

.menu{
    display:flex;
    align-items:center;
    padding:15px 18px;
    margin-bottom:15px;
    border-radius:16px;
    text-decoration:none;
    color:white;
    font-size:16px;
    font-weight:500;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

.menu:hover{
    background:rgba(255,255,255,0.15);
    transform:translateX(6px);
}

.menu::before{
    content:'';
    position:absolute;
    left:0;
    top:0;
    width:0%;
    height:100%;
    background:rgba(255,255,255,0.1);
    transition:0.3s;
}

.menu:hover::before{
    width:100%;
}

.active{
    background:rgba(255,255,255,0.2);
}

    </style>
</head>

<body>
<div class="sidebar">

    <div class="logo">
        ☰
    </div>

    <a href="/dashboard">Dashboard</a>

    <a href="/transaksi">Transaksi</a>

    <a href="/anggaran">Anggaran</a>

    <a href="/tabungan">Tabungan</a>

</div>
<div class="box">

<form action="/transaksi" method="post">

    <input type="text"
           name="nama"
           placeholder="Nama Transaksi"
           required>

    <input type="number"
           name="jumlah"
           placeholder="Jumlah"
           required>

    <select name="kategori" required>

        <option value="">
            -- Pilih Kategori --
        </option>

        <option value="Makan">
            Makan
        </option>

        <option value="Transport">
            Transport
        </option>

        <option value="Belanja">
            Belanja
        </option>

        <option value="Hiburan">
            Hiburan
        </option>

        <option value="Gaji">
            Gaji
        </option>

    </select>

    <select name="jenis" required>

        <option value="">
            -- Pilih Jenis --
        </option>

        <option value="Pemasukan">
            Pemasukan
        </option>

        <option value="Pengeluaran">
            Pengeluaran
        </option>

    </select>

    <button type="submit">
        Tambah Transaksi
    </button>

</form>

</div>

<table>

    <tr>
        <th>ID</th>
        <th>Nama</th>
        <th>Jumlah</th>
        <th>Jenis</th>
        <th>Kategori</th>
        <th>Aksi</th>
    </tr>

    <tr th:each="t : ${listTransaksi}">

        <td th:text="${t.id}"></td>

        <td th:text="${t.nama}"></td>

        <td th:text="'Rp ' + ${#numbers.formatInteger(t.jumlah, 3, 'POINT')}"></td>

        <td th:text="${t.jenis}"></td>
        <td th:text="${t.kategori}"></td>

        <td>

            <a th:href="@{/transaksi/edit/{id}(id=${t.id})}">
            Edit
            </a>

            |

            <a class="hapus"
            th:href="@{/transaksi/delete/{id}(id=${t.id})}">
            Hapus
            </a>

        </td>
    </tr>

</table>

</body>
</html>
