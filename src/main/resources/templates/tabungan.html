<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Tabungan - FinanceTracker</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins', sans-serif;
            background:#f4f7fe;
            color:#1e293b;
        }

         /* SIDEBAR */
        .sidebar{
            width:260px;
            height:100vh;
            position:fixed;
            left:0;
            top:0;

            background:
            linear-gradient(
            180deg,
            #0f172a,
            #1e1b4b,
            #312e81,
            #2563eb
            );

            background-size:400% 400%;
            animation:gradientMove 12s ease infinite;

            padding:30px 20px;
            color:white;
            overflow-y:auto;
            z-index:1000;
            box-shadow:6px 0 25px rgba(37,99,235,0.25);
        }

        @keyframes gradientMove{
            0%{
                background-position:0% 50%;
            }

            50%{
                background-position:100% 50%;
            }

            100%{
                background-position:0% 50%;
            }
        }

        /* LOGO */
        .sidebar h2{
            text-align:center;
            margin-bottom:50px;
            font-size:30px;
            font-weight:700;
            letter-spacing:1px;
            position:relative;
        }

        .sidebar h2::after{
            content:'';
            width:80px;
            height:4px;
            border-radius:10px;
            background:linear-gradient(90deg,#60a5fa,#c084fc);
            position:absolute;
            left:50%;
            transform:translateX(-50%);
            bottom:-12px;
        }

        /* MENU */
        .menu{
            display:flex;
            flex-direction:column;
            gap:16px;
        }

        .sidebar a{
            text-decoration:none;
            color:white;
            display:flex;
            align-items:center;
            gap:14px;
            padding:17px 18px;
            border-radius:18px;
            transition:0.35s ease;
            font-size:15px;
            font-weight:500;
            position:relative;
            overflow:hidden;
        }

        .sidebar a::before{
            content:'';
            position:absolute;
            width:0%;
            height:100%;
            left:0;
            top:0;
            background:rgba(255,255,255,0.1);
            transition:0.4s;
        }

        .sidebar a:hover::before{
            width:100%;
        }

        .sidebar a:hover{
            transform:translateX(8px) scale(1.02);
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        .sidebar a.active{
            background:rgba(255,255,255,0.18);
            backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.15);
            font-weight:600;
            box-shadow:0 10px 25px rgba(255,255,255,0.08);
        }

        /* ICON ANIMATION */
        .sidebar a:hover span{
            animation:wiggle 0.5s ease;
        }

        @keyframes wiggle{
            0%{
                transform:rotate(0deg);
            }

            25%{
                transform:rotate(-10deg);
            }

            50%{
                transform:rotate(10deg);
            }

            75%{
                transform:rotate(-5deg);
            }

            100%{
                transform:rotate(0deg);
            }
        }

        /* MAIN */
        .main{
            margin-left:260px;
            padding:35px;
            min-height:100vh;
        }

        /* TOPBAR */
        .topbar{
            background:white;
            padding:30px;
            border-radius:25px;
            box-shadow:0 8px 20px rgba(0,0,0,0.06);
            margin-bottom:30px;
        }

        .topbar h1{
            font-size:34px;
            margin-bottom:8px;
            color:#1e293b;
        }

        .topbar p{
            color:#64748b;
            font-size:15px;
        }

        /* CARD */
        .card{
            background:white;
            padding:35px;
            border-radius:25px;
            box-shadow:0 8px 20px rgba(0,0,0,0.06);
            margin-bottom:35px;
        }

        .card h2{
            color:#2563eb;
            margin-bottom:25px;
            font-size:26px;
        }

        /* FORM */
        .form-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }

        .input-group{
            display:flex;
            flex-direction:column;
        }

        .input-group label{
            margin-bottom:8px;
            font-size:14px;
            font-weight:500;
            color:#374151;
        }

        input{
            width:100%;
            padding:14px 16px;
            border:1px solid #d1d5db;
            border-radius:14px;
            outline:none;
            font-size:14px;
            background:#f9fafb;
            transition:0.3s;
        }

        input:focus{
            border-color:#2563eb;
            background:white;
            box-shadow:0 0 0 4px rgba(37,99,235,0.1);
        }

        /* BUTTON */
        .btn{
            margin-top:25px;
            padding:15px 24px;
            background:linear-gradient(135deg,#2563eb,#3b82f6);
            color:white;
            border:none;
            border-radius:16px;
            cursor:pointer;
            font-size:15px;
            font-weight:600;
            transition:0.3s;
            box-shadow:0 10px 20px rgba(37,99,235,0.25);
        }

        .btn:hover{
            transform:translateY(-3px);
            box-shadow:0 15px 25px rgba(37,99,235,0.35);
        }

        /* TABLE */
        .section-title{
            margin-bottom:20px;
        }

        .section-title h2{
            font-size:28px;
            color:#1e293b;
        }

        .table-box{
            background:white;
            border-radius:25px;
            overflow:hidden;
            overflow-x:auto;
            box-shadow:0 8px 20px rgba(0,0,0,0.06);
        }

        table{
            width:100%;
            border-collapse:collapse;
            min-width:1000px;
        }

        table th{
            background:#2563eb;
            color:white;
            padding:18px;
            text-align:left;
            font-size:14px;
        }

        table td{
            padding:18px;
            border-bottom:1px solid #e5e7eb;
            font-size:14px;
            vertical-align:middle;
        }

        table tr:hover{
            background:#f8fafc;
        }

        /* BADGES */
        .badge{
            padding:8px 14px;
            border-radius:20px;
            font-size:13px;
            font-weight:600;
            display:inline-block;
        }

        .target{
            background:#dbeafe;
            color:#1d4ed8;
        }

        .terkumpul{
            background:#dcfce7;
            color:#166534;
        }

        .sisa{
            background:#fee2e2;
            color:#991b1b;
        }

        /* PROGRESS */
        .progress-wrapper{
            min-width:180px;
        }

        .progress-box{
            width:100%;
            height:18px;
            background:#e5e7eb;
            border-radius:20px;
            overflow:hidden;
            margin-bottom:8px;
        }

        .progress{
            height:100%;
            background:linear-gradient(90deg,#2563eb,#60a5fa);
            border-radius:20px;
        }

        .progress-text{
            font-size:12px;
            color:#64748b;
            font-weight:600;
        }

        /* TAMBAH UANG */
        .tambah-form{
            display:flex;
            gap:10px;
            align-items:center;
        }

        .tambah-form input{
            min-width:150px;
            margin:0;
        }

        .mini-btn{
            padding:12px 18px;
            border:none;
            border-radius:12px;
            background:#2563eb;
            color:white;
            cursor:pointer;
            font-size:13px;
            font-weight:600;
            transition:0.3s;
            white-space:nowrap;
        }

        .mini-btn:hover{
            transform:translateY(-2px);
        }

        /* RESPONSIVE */
        @media(max-width:768px){

            .sidebar{
                width:100%;
                height:auto;
                position:relative;
                border-radius:0 0 25px 25px;
            }

            .menu{
                flex-direction:row;
                flex-wrap:wrap;
                justify-content:center;
            }

            .main{
                margin-left:0;
                padding:20px;
            }

            .topbar h1{
                font-size:28px;
            }

        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h2>🪙 CashMate</h2>

    <div class="menu">

        <a href="/dashboard">
            📊 Dashboard
        </a>

        <a href="/transaksi">
            💸 Transaksi
        </a>

        <a href="/anggaran">
            📈 Anggaran
        </a>

        <a href="/tabungan" class="active">
            🎯 Tabungan
        </a>

    </div>

</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="topbar">

        <h1>Target Tabungan</h1>

        <p>
            Kelola impian dan progres tabunganmu dengan mudah ✨
        </p>

    </div>

    <!-- FORM -->
    <div class="card">

        <h2>➕ Tambah Target Tabungan</h2>

        <form action="/tabungan" method="post">

            <div class="form-grid">

                <div class="input-group">

                    <label>Nama Target</label>

                    <input type="text"
                           name="namaTarget"
                           placeholder="Contoh: Laptop Gaming">

                </div>

                <div class="input-group">

                    <label>Target Jumlah</label>

                    <input type="number"
                           name="targetJumlah"
                           placeholder="Contoh: 10000000">

                </div>

            </div>

            <button type="submit" class="btn">
                🚀 Simpan Target
            </button>

        </form>

    </div>

    <!-- TABLE -->
    <div class="section-title">
        <h2>Daftar Target Tabungan</h2>
    </div>

    <div class="table-box">

        <table>

            <tr>
                <th>ID</th>
                <th>Nama Target</th>
                <th>Target</th>
                <th>Terkumpul</th>
                <th>Sisa</th>
                <th>Progress</th>
                <th>Tambah Uang</th>
            </tr>

            <tr th:each="t : ${listTabungan}">

                <td th:text="${t.tabunganId}"></td>

                <td th:text="${t.namaTarget}"></td>

                <td>
                    <span class="badge target"
                          th:text="'Rp ' + ${#numbers.formatInteger(t.targetJumlah, 0, 'POINT')}">
                    </span>
                </td>

                <td>
                    <span class="badge terkumpul"
                          th:text="'Rp ' + ${#numbers.formatInteger(t.jumlahTerkumpul, 0, 'POINT')}">
                    </span>
                </td>

                <td>
                    <span class="badge sisa"
                          th:text="'Rp ' + ${#numbers.formatInteger(t.targetJumlah - t.jumlahTerkumpul, 0, 'POINT')}">
                    </span>
                </td>

                <!-- PROGRESS -->
                <td>

                    <!-- PROGRESS -->
<td>

    <div class="progress-wrapper">

        <div class="progress-box">

            <div class="progress"
                 th:style="|width:${(t.jumlahTerkumpul * 100) / t.targetJumlah}%|">
            </div>

        </div>

        <div class="progress-text"
             th:text="${#numbers.formatDecimal((t.jumlahTerkumpul * 100.0 / t.targetJumlah),1,1)} + '%'">
        </div>

    </div>

</td>

                <!-- FORM TAMBAH -->
                <td>

                    <form class="tambah-form"
                          th:action="@{'/tabungan/tambah/' + ${t.tabunganId}}"
                          method="post">

                        <input type="number"
                               name="nominal"
                               placeholder="Tambah uang">

                        <button type="submit" class="mini-btn">
                            ➕ Tambah
                        </button>

                    </form>

                </td>

            </tr>

        </table>

    </div>

</div>

</body>
</html>
